<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Protótipo estático de app de delivery - carrinho.">
  <title>Protótipo UI UX - Carrinho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="carrinho">
  <div class="app-shell">
    <header class="topbar topbar--simple">
      <a class="icon-button" href="produto.html" aria-label="Voltar para produto">
        <img src="assets/icons/back.svg" alt="" width="20" height="20">
      </a>
      <h1 class="page-title">Seu pedido</h1>
      <span class="topbar__spacer" aria-hidden="true"></span>
    </header>

    <main class="content content--cart">
      <section class="section-block section-block--compact card-panel">
        <div class="panel-row panel-row--stack">
          <div>
            <p class="eyebrow">Endereço</p>
            <strong>Rua Exemplo, 120 - Centro</strong>
          </div>
          <button class="text-action" type="button">Alterar</button>
        </div>
      </section>

      <section class="section-block section-block--compact card-panel">
        <p class="eyebrow">Forma de pagamento</p>
        <div class="payment-chips" role="group" aria-label="Forma de pagamento">
          <button type="button" class="payment-chip is-active">Pix</button>
          <button type="button" class="payment-chip">Cartão</button>
          <button type="button" class="payment-chip">Dinheiro</button>
        </div>
      </section>

      <section class="section-block section-block--compact card-panel" id="cupom">
        <div class="panel-row panel-row--stack">
          <div>
            <p class="eyebrow">Cupom</p>
            <strong>Buscar cupom</strong>
          </div>
          <button class="text-action" type="button">Aplicar</button>
        </div>
      </section>

      <section class="section-block section-block--compact card-panel">
        <div class="section-head section-head--compact">
          <h2>Pedido</h2>
        </div>
        <div class="cart-items" id="cart-items"></div>
      </section>

      <section class="section-block section-block--last card-panel totals-panel">
        <div class="summary-line"><span>Subtotal</span><strong id="subtotal-value">R$ 0,00</strong></div>
        <div class="summary-line"><span>Entrega</span><strong>R$ 5,00</strong></div>
        <div class="summary-line summary-line--total"><span>Total</span><strong id="total-value">R$ 0,00</strong></div>
      </section>
    </main>

    <footer class="sticky-footer sticky-footer--cart">
      <div>
        <p class="eyebrow">Entrega estimada</p>
        <strong>20 min</strong>
      </div>
      <button class="button-primary" type="button" id="checkout-button">Pedir</button>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
