<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Protótipo estático de app de delivery - tela inicial.">
  <title>Protótipo UI UX - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar__profile">
        <div class="avatar" aria-hidden="true">P</div>
        <div>
          <p class="eyebrow">Entregar em</p>
          <button class="address-trigger" type="button" aria-label="Selecionar endereço">
            Casa <span class="chevron">▾</span>
          </button>
        </div>
      </div>
      <a class="icon-button icon-button--highlight" href="carrinho.html" aria-label="Abrir carrinho">
        <img src="assets/icons/cart.svg" alt="" width="22" height="22">
        <span class="cart-count" data-cart-count>0</span>
      </a>
    </header>

    <main class="content">
      <section class="search-section" id="buscar" aria-label="Buscar">
        <label class="searchbar">
          <img src="assets/icons/search.svg" alt="" width="18" height="18">
          <input type="search" placeholder="Buscar pratos ou restaurantes" aria-label="Buscar pratos ou restaurantes">
        </label>
      </section>

      <section class="section-block" aria-labelledby="restaurantes-title">
        <div class="section-head">
          <h2 id="restaurantes-title">Restaurantes</h2>
          <a href="#" class="section-link">Ver mais</a>
        </div>
        <div class="horizontal-scroll" id="restaurant-list"></div>
      </section>

      <section class="section-block" aria-labelledby="categorias-title">
        <div class="section-head">
          <h2 id="categorias-title">Categorias</h2>
        </div>
        <div class="categories-grid" id="category-list"></div>
      </section>

      <section class="section-block" aria-labelledby="recentes-title">
        <div class="section-head">
          <h2 id="recentes-title">Recentes</h2>
        </div>
        <div class="horizontal-scroll horizontal-scroll--recent" id="recent-list"></div>
      </section>

      <section class="section-block section-block--last" aria-labelledby="itens-title">
        <div class="section-head">
          <h2 id="itens-title">Para você</h2>
        </div>
        <div class="vertical-list" id="featured-list"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Navegação principal">
      <a class="bottom-nav__item is-active" href="index.html">
        <img src="assets/icons/home.svg" alt="" width="20" height="20">
        <span>Home</span>
      </a>
      <a class="bottom-nav__item" href="index.html#buscar">
        <img src="assets/icons/search.svg" alt="" width="20" height="20">
        <span>Buscar</span>
      </a>
      <a class="bottom-nav__item" href="carrinho.html#cupom">
        <img src="assets/icons/coupon.svg" alt="" width="20" height="20">
        <span>Cupons</span>
      </a>
      <a class="bottom-nav__item" href="carrinho.html">
        <img src="assets/icons/orders.svg" alt="" width="20" height="20">
        <span>Pedidos</span>
      </a>
    </nav>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
