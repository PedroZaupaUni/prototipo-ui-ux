<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Protótipo estático de app de delivery - produto.">
  <title>Protótipo UI UX - Produto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="produto">
  <div class="app-shell">
    <main class="content content--product">
      <section class="hero-card">
        <div class="hero-card__top">
          <a class="icon-button" href="index.html" aria-label="Voltar para a home">
            <img src="assets/icons/back.svg" alt="" width="20" height="20">
          </a>
          <button class="icon-button" type="button" aria-label="Adicionar aos favoritos">
            <img src="assets/icons/heart.svg" alt="" width="20" height="20">
          </button>
        </div>
        <div class="hero-card__image" aria-label="Imagem do restaurante">
          <div class="hero-illustration">
            <span class="hero-illustration__badge">Pizza</span>
          </div>
        </div>
      </section>

      <section class="section-block section-block--compact product-info-card">
        <div class="product-heading">
          <div>
            <h1>Pizza da Casa</h1>
            <p class="text-muted">Massa leve, ingredientes frescos e preparo rápido.</p>
          </div>
          <div class="price-tag">R$ 5 frete</div>
        </div>

        <div class="product-meta-grid">
          <div class="meta-pill">
            <img src="assets/icons/star.svg" alt="" width="16" height="16">
            <span>4.8</span>
          </div>
          <div class="meta-pill">
            <span>20–30 min</span>
          </div>
          <div class="meta-pill">
            <span>Alergênicos: glúten</span>
          </div>
          <div class="meta-pill meta-pill--light">
            <span>Opções disponíveis</span>
          </div>
        </div>
      </section>

      <section class="section-block section-block--last" aria-labelledby="sabores-title">
        <div class="section-head">
          <h2 id="sabores-title">Sabores</h2>
        </div>
        <div class="vertical-list" id="flavor-list"></div>
      </section>
    </main>

    <footer class="sticky-footer">
      <div>
        <p class="eyebrow">Pedido mínimo</p>
        <strong>R$ 39,90</strong>
      </div>
      <button class="button-primary" type="button" id="add-featured-product">Adicionar ao carrinho</button>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
